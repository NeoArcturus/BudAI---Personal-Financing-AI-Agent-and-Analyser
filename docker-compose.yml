services:
  # Database
  budai-db:
    image: postgres:15-alpine
    container_name: budai-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-budai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # iii Engine
  iii-engine:
    image: iiidev/iii:latest
    container_name: iii-engine
    command: ["--use-default-config"]
    ports:
      - "3111:3111"
      - "3112:3112"
      - "49134:49134"
    environment:
      - III_TELEMETRY_ENABLED=false
    restart: always

  # Main API Orchestrator
  budai-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: budai-api
    depends_on:
      budai-db:
        condition: service_healthy
      iii-engine:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@budai-db:5432/${POSTGRES_DB:-budai}
      - OLLAMA_BASE_URL=http://host.docker.internal:8000/v1
      - VLLM_SUMMARY_URL=http://host.docker.internal:8000/v1
      - NEWSDATA_API_KEY=${NEWSDATA_API_KEY}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - REDIRECT_URI=${REDIRECT_URI}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - III_ENGINE_URL=ws://iii-engine:49134
      - III_URL=ws://iii-engine:49134
      - III_TELEMETRY_ENABLED=false
    ports:
      - "8080:8080"
    restart: always

  # MCP Service Fleet (Now iii Workers)
  mcp-macro:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        - REQ_FILE=requirements-mcp-base.txt
    container_name: mcp-macro
    command: ["python", "-m", "mcp_servers.macro_server"]
    environment:
      - NEWSDATA_API_KEY=${NEWSDATA_API_KEY}
      - III_ENGINE_URL=ws://iii-engine:49134
      - III_URL=ws://iii-engine:49134
      - III_TELEMETRY_ENABLED=false
      - OTEL_SDK_DISABLED=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@budai-db:5432/${POSTGRES_DB:-budai}
    depends_on:
      budai-db:
        condition: service_healthy
      iii-engine:
        condition: service_started

  mcp-analyser:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        - REQ_FILE=requirements-mcp-base.txt
    container_name: mcp-analyser
    command: ["python", "-m", "mcp_servers.analyser_server"]
    environment:
      - III_ENGINE_URL=ws://iii-engine:49134
      - III_URL=ws://iii-engine:49134
      - III_TELEMETRY_ENABLED=false
      - OTEL_SDK_DISABLED=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@budai-db:5432/${POSTGRES_DB:-budai}
    depends_on:
      budai-db:
        condition: service_healthy
      iii-engine:
        condition: service_started

  mcp-forecaster:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        - REQ_FILE=requirements-forecaster.txt
    container_name: mcp-forecaster
    command: ["python", "-m", "mcp_servers.forecaster_server"]
    environment:
      - III_ENGINE_URL=ws://iii-engine:49134
      - III_URL=ws://iii-engine:49134
      - III_TELEMETRY_ENABLED=false
      - OTEL_SDK_DISABLED=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@budai-db:5432/${POSTGRES_DB:-budai}
    depends_on:
      budai-db:
        condition: service_healthy
      iii-engine:
        condition: service_started

  mcp-categorizer:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        - REQ_FILE=requirements-categorizer.txt
    container_name: mcp-categorizer
    command: ["python", "-m", "mcp_servers.categorizer_server"]
    environment:
      - III_ENGINE_URL=ws://iii-engine:49134
      - III_URL=ws://iii-engine:49134
      - III_TELEMETRY_ENABLED=false
      - OTEL_SDK_DISABLED=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@budai-db:5432/${POSTGRES_DB:-budai}
    depends_on:
      budai-db:
        condition: service_healthy
      iii-engine:
        condition: service_started

  mcp-memory:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        - REQ_FILE=requirements-memory.txt
    container_name: mcp-memory
    command: ["python", "-m", "mcp_servers.memory_server"]
    environment:
      - III_ENGINE_URL=ws://iii-engine:49134
      - III_URL=ws://iii-engine:49134
      - III_TELEMETRY_ENABLED=false
      - OTEL_SDK_DISABLED=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@budai-db:5432/${POSTGRES_DB:-budai}
    volumes:
      - ./memory_store:/app/memory_store
    depends_on:
      budai-db:
        condition: service_healthy
      iii-engine:
        condition: service_started

  mcp-health:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        - REQ_FILE=requirements-mcp-base.txt
    container_name: mcp-health
    command: ["python", "-m", "mcp_servers.health_server"]
    environment:
      - III_ENGINE_URL=ws://iii-engine:49134
      - III_URL=ws://iii-engine:49134
      - III_TELEMETRY_ENABLED=false
      - OTEL_SDK_DISABLED=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@budai-db:5432/${POSTGRES_DB:-budai}
    depends_on:
      budai-db:
        condition: service_healthy
      iii-engine:
        condition: service_started

volumes:
  postgres_data:
  memory_store:
