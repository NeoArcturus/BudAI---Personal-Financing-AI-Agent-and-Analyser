services:
  # Database
  budai-db:
    image: postgres:15-alpine
    container_name: budai-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-budai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Background Tasks
  budai-redis:
    image: redis:7-alpine
    container_name: budai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Main API Orchestrator
  budai-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: budai-api
    depends_on:
      budai-db:
        condition: service_healthy
      budai-redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@budai-db:5432/${POSTGRES_DB:-budai}
      - REDIS_URL=redis://budai-redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:8000/v1
      - VLLM_SUMMARY_URL=http://host.docker.internal:8000/v1
      - NEWSDATA_API_KEY=${NEWSDATA_API_KEY}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - REDIRECT_URI=${REDIRECT_URI}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - HF_TOKEN=${HF_TOKEN}
    ports:
      - "8080:8080"
    restart: always

volumes:
  postgres_data:
