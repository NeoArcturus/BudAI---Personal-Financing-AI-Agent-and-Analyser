services:
  # Database
  budai-db:
    image: postgres:15-alpine
    container_name: budai-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-budai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Main API Orchestrator
  budai-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: budai-api
    depends_on:
      budai-db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@budai-db:5432/${POSTGRES_DB:-budai}
      - REDIS_URL=redis://budai-redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - NEWSDATA_API_KEY=${NEWSDATA_API_KEY}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - REDIRECT_URI=${REDIRECT_URI}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - MCP_MACRO_URL=http://mcp-macro:8000/sse
      - MCP_ANALYSER_URL=http://mcp-analyser:8000/sse
      - MCP_FORECASTER_URL=http://mcp-forecaster:8000/sse
      - MCP_CATEGORIZER_URL=http://mcp-categorizer:8000/sse
      - MCP_MEMORY_URL=http://mcp-memory:8000/sse
      - MCP_HEALTH_URL=http://mcp-health:8000/sse
    ports:
      - "8080:8080"
    restart: always

  # MCP Service Fleet
  mcp-macro:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        - REQ_FILE=requirements-mcp-base.txt
    container_name: mcp-macro
    command: ["python", "-m", "mcp_servers.macro_server", "--sse"]
    environment:
      - MCP_PORT=8000
      - NEWSDATA_API_KEY=${NEWSDATA_API_KEY}
    ports:
      - "8001:8000"
    expose:
      - "8000"

  mcp-analyser:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        - REQ_FILE=requirements-mcp-base.txt
    container_name: mcp-analyser
    command: ["python", "-m", "mcp_servers.analyser_server", "--sse"]
    ports:
      - "8002:8000"
    expose:
      - "8000"

  mcp-forecaster:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        - REQ_FILE=requirements-forecaster.txt
    container_name: mcp-forecaster
    command: ["python", "-m", "mcp_servers.forecaster_server", "--sse"]
    ports:
      - "8003:8000"
    expose:
      - "8000"

  mcp-categorizer:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        - REQ_FILE=requirements-categorizer.txt
    container_name: mcp-categorizer
    command: ["python", "-m", "mcp_servers.categorizer_server", "--sse"]
    ports:
      - "8004:8000"
    expose:
      - "8000"

  mcp-memory:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        - REQ_FILE=requirements-memory.txt
    container_name: mcp-memory
    command: ["python", "-m", "mcp_servers.memory_server", "--sse"]
    ports:
      - "8005:8000"
    expose:
      - "8000"
    volumes:
      - ./memory_store:/app/memory_store

  mcp-health:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        - REQ_FILE=requirements-mcp-base.txt
    container_name: mcp-health
    command: ["python", "-m", "mcp_servers.health_server", "--sse"]
    ports:
      - "8006:8000"
    expose:
      - "8000"

  # Redis for Task Queue and Caching
  budai-redis:
    image: redis:7-alpine
    container_name: budai-redis
    ports:
      - "6379:6379"
    restart: always

  # Celery Worker for LangGraph execution
  budai-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: budai-worker
    command: ["celery", "-A", "services.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    depends_on:
      budai-db:
        condition: service_healthy
      budai-redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@budai-db:5432/${POSTGRES_DB:-budai}
      - REDIS_URL=redis://budai-redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - NEWSDATA_API_KEY=${NEWSDATA_API_KEY}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - REDIRECT_URI=${REDIRECT_URI}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - MCP_MACRO_URL=http://mcp-macro:8000/sse
      - MCP_ANALYSER_URL=http://mcp-analyser:8000/sse
      - MCP_FORECASTER_URL=http://mcp-forecaster:8000/sse
      - MCP_CATEGORIZER_URL=http://mcp-categorizer:8000/sse
      - MCP_MEMORY_URL=http://mcp-memory:8000/sse
      - MCP_HEALTH_URL=http://mcp-health:8000/sse
    volumes:
      - ./memory_store:/app/memory_store
    restart: always

volumes:
  postgres_data:
  memory_store:
